<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise SSO - Orland Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] }, colors: { primary: '#5b83e8', secondary: '#f4f6f9' } } } }</script>
    <style>
        body { background-color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'Poppins', sans-serif; }
        .input-group input:focus { outline: none; border-color: #5b83e8; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 50; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: white; border-left: 4px solid #5b83e8; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 1rem; border-radius: 0.5rem; transform: translateX(120%); transition: transform 0.3s ease-out; display: flex; align-items: center; gap: 10px; }
        .toast.show { transform: translateX(0); }
        @media (min-width: 768px) { .panel-blue { border-radius: 1rem 100px 100px 1rem; } .panel-blue.reverse { border-radius: 100px 1rem 1rem 100px; } }
        @media (max-width: 767px) { .panel-blue { border-radius: 0 0 50px 50px; } }
    </style>
</head>
<body class="text-gray-800 antialiased p-4">

    <div id="toast-container"></div>

    <div id="main-container" class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl flex flex-col md:flex-row overflow-hidden relative min-h-[600px] transition-all duration-500 fade-in">
        
        <div id="blue-panel" class="panel-blue bg-primary text-white w-full md:w-2/5 p-8 flex flex-col justify-center items-center text-center transition-all duration-500 z-10 relative">
            <div id="panel-content-login" class="fade-in">
                <h2 class="text-3xl font-bold mb-2">Halo, Selamat Datang!</h2>
                <p class="text-sm text-blue-100 mb-6">Belum memiliki akun?</p>
                <button type="button" onclick="window.switchMode('register')" class="border-2 border-white rounded-full px-8 py-2 font-semibold hover:bg-white hover:text-primary transition-colors cursor-pointer">Daftar</button>
            </div>
            <div id="panel-content-register" class="hidden fade-in">
                <h2 class="text-3xl font-bold mb-2">Selamat Datang Kembali!</h2>
                <p class="text-sm text-blue-100 mb-6">Sudah memiliki akun?</p>
                <button type="button" onclick="window.switchMode('login')" class="border-2 border-white rounded-full px-8 py-2 font-semibold hover:bg-white hover:text-primary transition-colors cursor-pointer">Masuk</button>
            </div>
        </div>

        <div class="w-full md:w-3/5 p-8 md:p-12 flex items-center justify-center bg-white relative">
            
            <div id="view-login" class="w-full max-w-md fade-in block">
                <h2 class="text-3xl font-bold text-center mb-8">Login</h2>
                <form onsubmit="window.doLoginPassword(); return false;" class="space-y-4">
                    <div class="input-group relative bg-secondary rounded-lg flex items-center px-4 py-3 border border-gray-200">
                        <i class="fa-solid fa-user text-gray-400 w-5"></i>
                        <input type="text" id="logId" placeholder="Username / Email / No HP" class="bg-transparent w-full ml-3 text-sm focus:outline-none" required>
                    </div>
                    <div class="input-group relative bg-secondary rounded-lg flex items-center px-4 py-3 border border-gray-200">
                        <i class="fa-solid fa-lock text-gray-400 w-5"></i>
                        <input type="password" id="logPw" placeholder="Password" class="bg-transparent w-full ml-3 text-sm pr-10 focus:outline-none" required>
                        <i class="fa-solid fa-eye-slash absolute right-4 text-gray-400 cursor-pointer" onclick="window.toggleVis('logPw', this)"></i>
                    </div>
                    
                    <div class="flex justify-between items-center text-sm">
                        <div class="flex gap-2">
                            <a href="#" onclick="window.showView('view-login-otp')" class="text-primary font-medium hover:underline text-xs cursor-pointer">Login OTP</a>
                            <span class="text-gray-300">|</span>
                            <a href="#" onclick="window.showView('view-login-pin')" class="text-primary font-medium hover:underline text-xs cursor-pointer">Login PIN</a>
                        </div>
                        <a href="#" onclick="window.showView('view-forgot')" class="text-gray-500 hover:text-primary text-xs cursor-pointer">Lupa Password?</a>
                    </div>
                    <button type="submit" class="w-full bg-primary text-white rounded-lg py-3 font-semibold hover:bg-blue-600 transition-colors shadow-lg mt-4 cursor-pointer">Masuk</button>
                    
                    <div class="mt-8 text-center">
                        <p class="text-xs text-gray-500 mb-4">atau masuk dengan sosial media</p>
                        <div class="flex justify-center gap-4 flex-wrap">
                            <div id="g_id_onload"
                                 data-client_id="GANTI_DENGAN_GOOGLE_CLIENT_ID_ANDA.apps.googleusercontent.com"
                                 data-context="signin"
                                 data-ux_mode="popup"
                                 data-callback="handleGoogleLogin"
                                 data-auto_prompt="false">
                            </div>
                            <div class="g_id_signin" data-type="icon" data-shape="circle" data-theme="outline" data-size="large"></div>
                            
                            <button type="button" class="w-10 h-10 rounded-full border border-gray-300 flex items-center justify-center hover:bg-gray-50 cursor-pointer"><i class="fa-brands fa-facebook-f text-blue-600"></i></button>
                            <button type="button" class="w-10 h-10 rounded-full border border-gray-300 flex items-center justify-center hover:bg-gray-50 cursor-pointer"><i class="fa-brands fa-instagram text-pink-600"></i></button>
                            <button type="button" class="w-10 h-10 rounded-full border border-gray-300 flex items-center justify-center hover:bg-gray-50 cursor-pointer"><i class="fa-brands fa-tiktok text-black"></i></button>
                        </div>
                    </div>
                </form>
            </div>

            <div id="view-register" class="w-full max-w-md fade-in hidden">
                <h2 class="text-3xl font-bold text-center mb-6">Registrasi</h2>
                <form onsubmit="window.handleRegisterSubmit(); return false;" class="space-y-4">
                    <div class="flex bg-secondary rounded-lg p-1 mb-2 border border-gray-200">
                        <label class="flex-1 text-center">
                            <input type="radio" name="role" value="talent" class="peer hidden" checked>
                            <div class="py-2 text-sm font-medium text-gray-500 rounded-md cursor-pointer peer-checked:bg-white peer-checked:text-primary peer-checked:shadow-sm">Talent</div>
                        </label>
                        <label class="flex-1 text-center">
                            <input type="radio" name="role" value="client" class="peer hidden">
                            <div class="py-2 text-sm font-medium text-gray-500 rounded-md cursor-pointer peer-checked:bg-white peer-checked:text-primary peer-checked:shadow-sm">Client</div>
                        </label>
                    </div>
                    <div class="input-group relative bg-secondary rounded-lg flex items-center px-4 py-3 border border-gray-200">
                        <i class="fa-solid fa-user text-gray-400 w-5"></i>
                        <input type="text" id="reg-name" placeholder="Nama Lengkap" class="bg-transparent w-full ml-3 text-sm focus:outline-none" required>
                    </div>
                    <div class="input-group relative bg-secondary rounded-lg flex items-center px-4 py-3 border border-gray-200">
                        <i class="fa-solid fa-envelope text-gray-400 w-5"></i>
                        <input type="email" id="reg-email" placeholder="Email" class="bg-transparent w-full ml-3 text-sm focus:outline-none" required>
                    </div>
                    <div class="input-group relative bg-secondary rounded-lg flex items-center px-4 py-3 border border-gray-200">
                        <i class="fa-solid fa-phone text-gray-400 w-5"></i>
                        <input type="tel" id="reg-phone" inputmode="numeric" pattern="[0-9]*" placeholder="Nomor WhatsApp" class="bg-transparent w-full ml-3 text-sm focus:outline-none" required>
                    </div>
                    <div class="input-group relative bg-secondary rounded-lg flex items-center px-4 py-3 border border-gray-200">
                        <i class="fa-solid fa-lock text-gray-400 w-5"></i>
                        <input type="password" id="reg-password" placeholder="Password" class="bg-transparent w-full ml-3 text-sm pr-10 focus:outline-none" required>
                        <i class="fa-solid fa-eye-slash absolute right-4 text-gray-400 cursor-pointer" onclick="window.toggleVis('reg-password', this)"></i>
                    </div>
                    <button type="submit" class="w-full bg-primary text-white rounded-lg py-3 font-semibold shadow-lg cursor-pointer">Daftar Sekarang</button>
                </form>
            </div>

            <div id="view-social-complete" class="w-full max-w-md fade-in hidden">
                <button type="button" onclick="window.switchMode('login')" class="text-gray-400 hover:text-primary mb-4 flex items-center gap-2 text-sm cursor-pointer"><i class="fa-solid fa-arrow-left"></i> Batal</button>
                <div class="flex items-center gap-3 mb-6 bg-secondary p-4 rounded-xl border border-gray-100">
                    <i id="social-icon" class="fa-brands fa-google text-3xl text-red-500"></i>
                    <div>
                        <h2 class="text-xl font-bold">Lengkapi Profil Anda</h2>
                        <p id="social-email-display" class="text-xs text-gray-500"></p>
                    </div>
                </div>
                <form onsubmit="window.handleSocialCompleteSubmit(); return false;" class="space-y-4">
                    <input type="hidden" id="social-temp-token">
                    
                    <div class="flex bg-secondary rounded-lg p-1 border border-gray-200">
                        <label class="flex-1 text-center">
                            <input type="radio" name="social-role" value="talent" class="peer hidden" checked>
                            <div class="py-2 text-sm font-medium text-gray-500 rounded-md cursor-pointer peer-checked:bg-white peer-checked:text-primary">Talent</div>
                        </label>
                        <label class="flex-1 text-center">
                            <input type="radio" name="social-role" value="client" class="peer hidden">
                            <div class="py-2 text-sm font-medium text-gray-500 rounded-md cursor-pointer peer-checked:bg-white peer-checked:text-primary">Client</div>
                        </label>
                    </div>
                    
                    <div class="input-group relative bg-gray-100 rounded-lg flex items-center px-4 py-3 opacity-70 border border-gray-200">
                        <i class="fa-solid fa-user text-gray-500 w-5"></i>
                        <input type="text" id="social-name" disabled class="bg-transparent w-full ml-3 text-sm text-gray-600 focus:outline-none">
                    </div>
                    <div class="input-group relative bg-secondary rounded-lg flex items-center px-4 py-3 border border-gray-200">
                        <i class="fa-solid fa-phone text-gray-400 w-5"></i>
                        <input type="tel" id="social-phone" inputmode="numeric" pattern="[0-9]*" placeholder="Nomor WhatsApp" class="bg-transparent w-full ml-3 text-sm focus:outline-none" required>
                    </div>
                    
                    <button type="submit" class="w-full bg-primary text-white rounded-lg py-3 font-semibold shadow-lg cursor-pointer">Selesaikan Pendaftaran</button>
                </form>
            </div>

            <div id="view-login-pin" class="w-full max-w-md fade-in hidden">
                <button type="button" onclick="window.showView('view-login')" class="text-gray-400 hover:text-primary mb-6 flex items-center gap-2 text-sm cursor-pointer"><i class="fa-solid fa-arrow-left"></i> Kembali</button>
                <h2 class="text-3xl font-bold mb-2">Login dengan PIN</h2>
                <p class="text-sm text-gray-500 mb-8">Masukkan identitas dan PIN 6 digit Anda.</p>
                <form onsubmit="window.doLoginPin(); return false;" class="space-y-4">
                    <div class="input-group relative bg-secondary rounded-lg flex items-center px-4 py-3 border border-gray-200">
                        <i class="fa-solid fa-user text-gray-400 w-5"></i>
                        <input type="text" id="logPinId" placeholder="Username / Email / No HP" class="bg-transparent w-full ml-3 text-sm focus:outline-none" required>
                    </div>
                    <div class="input-group relative bg-secondary rounded-lg flex items-center px-4 py-3 border border-gray-200">
                        <i class="fa-solid fa-key text-gray-400 w-5"></i>
                        <input type="password" id="logPinCode" inputmode="numeric" pattern="[0-9]*" placeholder="6 Digit PIN" maxlength="6" class="bg-transparent w-full ml-3 text-center tracking-[0.5em] font-bold text-lg focus:outline-none" required>
                    </div>
                    <button type="submit" class="w-full bg-primary text-white rounded-lg py-3 font-semibold shadow-lg cursor-pointer">Masuk ke Dashboard</button>
                </form>
            </div>

            </div>
    </div>

    <script type="module" src="./assets/JS/sso_auth_ui.js"></script>
</body>
</html>
