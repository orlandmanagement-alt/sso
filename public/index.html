<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Orland SSO • Access</title>
  <meta name="theme-color" content="#0b1120">
  <link rel="stylesheet" href="/assets/css/sso.css">
  <style>
    /* Tambahan untuk mempercantik input PIN */
    .pin-input { letter-spacing: 0.5em; text-align: center; font-size: 1.25rem; font-weight: bold; }
    .nested-form { transition: opacity 0.3s ease; }
    .hidden { display: none !important; opacity: 0; }
  </style>
</head>
<body class="sso-page">
  <div class="sso-bg">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="orb orb-c"></div>
    <div class="grid"></div>
  </div>

  <main class="shell">
    <section class="hero reveal">
      <div class="brand-row">
        <div class="brand-mark">O</div>
        <div>
          <div class="brand-name">Orland Management</div>
          <div class="brand-sub">Secure Unified Access</div>
        </div>
      </div>

      <div class="hero-copy">
        <span class="eyebrow">Corporate Single Sign-On</span>
        <h1>One secure access point for Dashboard, Talent, and Client.</h1>
        <p>Login securely with a 6-Digit PIN or OTP, register your account, and manage access in one responsive experience.</p>
      </div>
    </section>

    <section class="auth-card reveal delay-1">
      <div class="card-top">
        <div>
          <div class="card-kicker">Account Access</div>
          <h2>Welcome</h2>
        </div>
        <div class="status-dot" aria-hidden="true"></div>
      </div>

      <div class="tabbar" role="tablist">
        <button class="tab active" type="button" data-tab="login">Login</button>
        <button class="tab" type="button" data-tab="register">Register</button>
        <button class="tab" type="button" data-tab="reset">Forgot PIN</button>
      </div>

      <div class="tabpanels">
        
        <section class="tabpanel active" data-panel="login">
          <form id="loginInitForm" class="form-stack">
            <div class="field">
              <label for="loginIdentifier">Email or WhatsApp Number</label>
              <input id="loginIdentifier" type="text" placeholder="you@example.com or 08xxxx" required>
            </div>
            <button class="btn btn-primary" type="submit">Continue</button>
          </form>

          <form id="loginPinForm" class="form-stack nested-form hidden">
            <div class="field">
              <label for="loginPin">Enter 6-Digit PIN</label>
              <input id="loginPin" class="pin-input" type="password" placeholder="••••••" inputmode="numeric" maxlength="6" required>
            </div>
            <button class="btn btn-primary" type="submit">Secure Login</button>
            <div class="card-actions" style="margin-top: 10px;">
              <a href="#" id="btnUseOtpFallback">Forgot PIN? Login via OTP</a>
            </div>
          </form>

          <form id="loginOtpForm" class="form-stack nested-form hidden">
            <div class="field">
              <label for="loginOtpCode">OTP Code</label>
              <input id="loginOtpCode" class="pin-input" type="text" placeholder="123456" inputmode="numeric" maxlength="6" required>
            </div>
            <button class="btn btn-primary" type="submit">Verify & Login</button>
          </form>
        </section>

        <section class="tabpanel" data-panel="register">
          <form id="registerInitForm" class="form-stack">
            <div class="two-col">
              <div class="field">
                <label for="registerRole">Account Type</label>
                <select id="registerRole" required>
                  <option value="talent">Talent</option>
                  <option value="client">Client</option>
                </select>
              </div>
              <div class="field">
                <label for="registerOtpChannel">Verification By</label>
                <select id="registerOtpChannel" required>
                  <option value="email">Email</option>
                  <option value="wa">WhatsApp</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label for="registerName">Full Name</label>
              <input id="registerName" type="text" placeholder="John Doe" required>
            </div>
            <div class="field">
              <label for="registerEmail">Email</label>
              <input id="registerEmail" type="email" placeholder="you@example.com" autocomplete="email" required>
            </div>
            <div class="field">
              <label for="registerWa">WhatsApp Number</label>
              <input id="registerWa" type="text" placeholder="08xxxxxxxxxx" autocomplete="tel" required>
            </div>
            <button class="btn btn-primary" type="submit">Request Verification</button>
          </form>

          <form id="registerVerifyForm" class="form-stack nested-form hidden">
            <div class="field">
              <label for="registerVerifyCode">Verification Code</label>
              <input id="registerVerifyCode" class="pin-input" type="text" placeholder="123456" inputmode="numeric" maxlength="6" required>
            </div>
            <button class="btn btn-primary" type="submit">Verify Code</button>
          </form>

          <form id="registerPinForm" class="form-stack nested-form hidden">
            <div class="field">
              <label for="registerPin1">Create 6-Digit PIN</label>
              <input id="registerPin1" class="pin-input" type="password" placeholder="••••••" inputmode="numeric" maxlength="6" required>
            </div>
            <div class="field">
              <label for="registerPin2">Confirm PIN</label>
              <input id="registerPin2" class="pin-input" type="password" placeholder="••••••" inputmode="numeric" maxlength="6" required>
            </div>
            <button class="btn btn-primary" type="submit">Activate Account</button>
          </form>
        </section>

        <section class="tabpanel" data-panel="reset">
          <form id="resetRequestForm" class="form-stack">
            <div class="field">
              <label for="resetIdentifier">Email or WhatsApp Number</label>
              <input id="resetIdentifier" type="text" placeholder="Email or 08xxxx" required>
            </div>
            <div class="field">
              <label for="resetChannel">Send Reset Code Via</label>
              <select id="resetChannel">
                <option value="email">Email</option>
                <option value="wa">WhatsApp</option>
              </select>
            </div>
            <button class="btn btn-primary" type="submit">Request Reset Code</button>
          </form>

          <form id="resetVerifyForm" class="form-stack nested-form hidden">
            <div class="field">
              <label for="resetOtpCode">Reset Code</label>
              <input id="resetOtpCode" class="pin-input" type="text" placeholder="123456" inputmode="numeric" maxlength="6" required>
            </div>
            <button class="btn btn-primary" type="submit">Verify Code</button>
          </form>

          <form id="resetPinForm" class="form-stack nested-form hidden">
            <div class="field">
              <label for="resetNewPin">New 6-Digit PIN</label>
              <input id="resetNewPin" class="pin-input" type="password" placeholder="••••••" inputmode="numeric" maxlength="6" required>
            </div>
            <button class="btn btn-primary" type="submit">Save New PIN & Login</button>
          </form>
        </section>
      </div>

      <div id="notice" class="notice"></div>

    </section>
  </main>

  <script type="module" src="/assets/js/sso_auth_ui.js"></script>
</body>
</html>
