<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verify OTP</title>
  <link rel="stylesheet" href="/assets/css/sso.css">
</head>
<body>
  <main class="sso-wrap">
    <section class="sso-card">
      <h1>Verify OTP</h1>
      <p class="muted">Enter the OTP sent to your email.</p>

      <form id="verifyOtpForm" class="stack">
        <label>Email</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required>
        <label>OTP Code</label>
        <input id="otp" type="text" placeholder="123456" inputmode="numeric" required>
        <label>Portal</label>
        <select id="portal">
          <option value="">Auto</option>
          <option value="dashboard">Dashboard</option>
          <option value="talent">Talent</option>
          <option value="client">Client</option>
        </select>
        <label>Next Path</label>
        <input id="next" type="text" placeholder="/" value="/">
        <button type="submit">Verify OTP</button>
      </form>

      <div id="notice" class="notice"></div>

      <div class="actions">
        <a href="/index.html">Back to login</a>
      </div>
    </section>
  </main>
  <script type="module" src="/assets/js/sso_verify.js"></script>
</body>
</html>
