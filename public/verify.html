<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Orland SSO • Verify</title>
  <meta name="theme-color" content="#0b1120">
  <link rel="stylesheet" href="/assets/css/sso.css">
</head>
<body class="sso-page">
  <div class="sso-bg">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="orb orb-c"></div>
    <div class="grid"></div>
  </div>

  <main class="shell shell-narrow">
    <section class="auth-card auth-card-wide reveal">
      <div class="card-top">
        <div>
          <div class="card-kicker">Verification</div>
          <h2>Confirm your OTP code</h2>
        </div>
        <div class="status-dot" aria-hidden="true"></div>
      </div>

      <p class="intro-text">
        Enter the verification code sent to your email to continue securely.
      </p>

      <form id="verifyOtpForm" class="form-stack">
        <div class="field">
          <label for="email">Work Email</label>
          <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required>
        </div>

        <div class="field">
          <label for="otp">OTP Code</label>
          <input id="otp" type="text" placeholder="123456" inputmode="numeric" autocomplete="one-time-code" required>
        </div>

        <div class="two-col">
          <div class="field">
            <label for="portal">Portal</label>
            <select id="portal">
              <option value="">Auto detect</option>
              <option value="dashboard">Dashboard</option>
              <option value="talent">Talent</option>
              <option value="client">Client</option>
            </select>
          </div>

          <div class="field">
            <label for="next">Next Path</label>
            <input id="next" type="text" value="/" placeholder="/">
          </div>
        </div>

        <button class="btn btn-primary" type="submit">
          <span>Verify & Continue</span>
        </button>
      </form>

      <div id="notice" class="notice"></div>

      <div class="card-actions">
        <a href="/index.html">Back to sign in</a>
      </div>
    </section>
  </main>

  <script type="module" src="/assets/js/sso_verify.js"></script>
</body>
</html>
